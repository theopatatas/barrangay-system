<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barangay Resident Login / Signup</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin:0; padding:0; }
body, html {
  width: 100%;
  height: 100%;
  font-family: "Inter", "Segoe UI", Arial, sans-serif;
  background: #0f3d1d;
  color: #fff;
  overflow-x: hidden;
  position: relative;
}
body::before {
  content: "";
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 100%;
  height: 100%;
  background: url("e9bc6878-e669-4753-bf3c-83e2d815a768.jpg") center / cover no-repeat;
  opacity: 0.12;
  filter: blur(5px);
  z-index: 0;
  animation: fadeBG 10s ease-in-out infinite alternate;
}
@keyframes fadeBG {
  0% { opacity: 0.08; transform: translate(-50%, -50%) scale(1); }
  50% { opacity: 0.12; transform: translate(-50%, -50%) scale(1.02); }
  100% { opacity: 0.08; transform: translate(-50%, -50%) scale(1); }
}
.container { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
.auth-container {
  max-width: 360px;
  width: 100%;
  padding: 30px 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  text-align: center;
}
.logo-wrapper { width: 100px; height: 100px; margin: 0 auto 14px; border-radius: 50%; overflow: hidden; background: rgba(255,255,255,0.25); display: flex; justify-content: center; align-items: center; }
.logo-wrapper img { width: 80%; height: 80%; object-fit: cover; border-radius: 50%; }
.auth-container h2 { font-size: 16px; margin-bottom: 16px; }
.input-group { margin-top: 10px; position: relative; }
input { width: 100%; padding: 12px 14px; border-radius: 12px; border: none; font-size: 14px; }
.password-wrap { position: relative; }
.password-wrap input { padding-right: 70px; }
.toggle-password {
  position: absolute;
  top: 50%;
  right: 10px;
  transform: translateY(-50%);
  width: auto;
  margin-top: 0;
  padding: 6px 10px;
  border-radius: 10px;
  background: rgba(15, 61, 29, 0.85);
  font-size: 12px;
}
button {
  width: 100%;
  margin-top: 14px;
  padding: 12px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg, #43a047, #1b5e20);
  color: #fff;
  font-size: 15px;
  cursor: pointer;
}
.switch { margin-top: 10px; font-size: 13px; cursor: pointer; text-decoration: underline; color: #cde6c7; }
.message { margin-bottom: 10px; padding: 8px; border-radius: 10px; font-size: 13px; display: none; }
.message.error { background: rgba(244,67,54,0.85); }
.message.success { background: rgba(76,175,80,0.85); }
#signupForm { display: none; }
.info-section { max-width: 360px; margin-top: 10px; text-align: center; font-size: 13px; color: #cde6c7; }
</style>
</head>

<body>
<div class="container">
  <div class="auth-container">
    <div class="logo-wrapper">
      <img src="e9bc6878-e669-4753-bf3c-83e2d815a768.jpg" alt="Logo">
    </div>
    <h2>Barangay Management of<br>Barangay Santa Rosa, Nueva Ecija</h2>
    <div id="messageBox" class="message"></div>

    <!-- LOGIN -->
    <div id="loginForm">
      <div class="input-group"><input id="loginUsername" placeholder="Username / Email"></div>
      <div class="input-group password-wrap">
        <input id="loginPassword" type="password" placeholder="Password">
        <button type="button" class="toggle-password" onclick="togglePassword('loginPassword', this)">Show</button>
      </div>
      <button onclick="login()">Login</button>
      <div class="switch" onclick="toggleSignup()">Create Account</div>
    </div>

    <!-- SIGNUP -->
    <div id="signupForm">
      <div class="input-group"><input id="signupFullName" placeholder="Full Name"></div>
      <div class="input-group"><input id="signupAddress" placeholder="Address"></div>
      <div class="input-group"><input id="signupUsername" placeholder="Username / Email"></div>
      <div class="input-group password-wrap">
        <input id="signupPassword" type="password" placeholder="Password">
        <button type="button" class="toggle-password" onclick="togglePassword('signupPassword', this)">Show</button>
      </div>
      <button onclick="signup()">Sign Up</button>
      <div class="switch" onclick="toggleSignup()">Back to Login</div>
    </div>
  </div>

  <div class="info-section">
    <p>&copy; 2026 Barangay Santa Rosa</p>
  </div>
</div>

<script>
const messageBox = document.getElementById("messageBox");

async function parseJsonResponse(res) {
  const text = await res.text();

  try {
    return text ? JSON.parse(text) : {};
  } catch (err) {
    return { message: "Unexpected server response" };
  }
}

async function checkServerConnection() {
  if (window.location.protocol === "file:") {
    showMessage("Open this system through http://localhost:3000, not by double-clicking the HTML file.", "error");
    return;
  }

  try {
    const res = await fetch("/api/health");
    if (!res.ok) throw new Error("Health check failed");
  } catch (err) {
    showMessage("Cannot connect to the server. Start it with 'npm start' and open http://localhost:3000.", "error");
  }
}

function showMessage(msg, type){
  messageBox.textContent = msg;
  messageBox.className = "message " + type;
  messageBox.style.display = "block";
}
function clearMessage(){ messageBox.style.display="none"; }

function togglePassword(inputId, button){
  const input = document.getElementById(inputId);
  const isHidden = input.type === "password";
  input.type = isHidden ? "text" : "password";
  button.textContent = isHidden ? "Hide" : "Show";
}

function toggleSignup(){
  clearMessage();
  const signup = document.getElementById("signupForm");
  const login = document.getElementById("loginForm");
  if(signup.style.display==="block"){
    signup.style.display="none";
    login.style.display="block";
  } else {
    signup.style.display="block";
    login.style.display="none";
  }
}

// --- SIGNUP ---
async function signup(){
  const fullName = document.getElementById("signupFullName").value.trim();
  const address = document.getElementById("signupAddress").value.trim();
  const username = document.getElementById("signupUsername").value.trim();
  const password = document.getElementById("signupPassword").value;

  if(!fullName||!address||!username||!password){
    showMessage("Please fill all fields.", "error"); return;
  }

  try {
    const res = await fetch("/api/register", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ name: fullName, email: username, password, address })
    });
    const data = await parseJsonResponse(res);
    if(!res.ok){ showMessage(data.message, "error"); return; }
    showMessage("Account created successfully.", "success");
    toggleSignup();
  } catch(err){
    console.error(err);
    showMessage("Cannot connect to the server. Start it with 'npm start' and open http://localhost:3000.", "error");
  }
}

// --- LOGIN ---
async function login(){
  const username = document.getElementById("loginUsername").value.trim();
  const password = document.getElementById("loginPassword").value;

  if(!username||!password){ showMessage("Please enter login details.", "error"); return; }

  try {
    const res = await fetch("/api/login", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ email: username, password })
    });
    const data = await parseJsonResponse(res);
    if(!res.ok){ showMessage(data.message,"error"); return; }

    // Save user session (frontend)
    localStorage.setItem("currentUser", JSON.stringify(data.user));
    window.location.href = data.user.role === "admin" ? "admin.html" : "dashboard.html";
  } catch(err){
    console.error(err);
    showMessage("Cannot connect to the server. Start it with 'npm start' and open http://localhost:3000.", "error");
  }
}

// Redirect if already logged in
if(localStorage.getItem("currentUser")) window.location.href="dashboard.html";
checkServerConnection();

</script>
</body>
</html>
