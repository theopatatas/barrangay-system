<!-- public/admin.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', sans-serif; margin: 20px; background: #f5f5f5; color: #2c3e50; }
  h1 { font-size: 28px; margin-bottom: 20px; }
  h2 { font-size: 22px; margin-top: 40px; margin-bottom: 16px; color: #1565c0; }

  /* --- Card Container for Requests & Complaints --- */
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }

  .card { background: #fff; padding: 16px; border-radius: 12px; box-shadow: 0 6px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 8px; transition: transform 0.2s; }
  .card:hover { transform: translateY(-4px); }

  .card-header { font-weight: 600; font-size: 16px; color: #1565c0; margin-bottom: 8px; }
  .card-row { display: flex; justify-content: space-between; margin: 2px 0; }
  .card-row span { font-weight: 500; }

  /* Buttons */
  .card button { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; transition: background 0.2s, color 0.2s; margin-top: 6px; }
  .approve { background: #43a047; color: #fff; }
  .approve:hover { background: #2e7d32; }
  .reject { background: #c62828; color: #fff; }
  .reject:hover { background: #8e0000; }

  /* Status coloring */
  .status-Pending { color: #ef6c00; font-weight: 600; }
  .status-Approved { color: #43a047; font-weight: 600; }
  .status-Rejected { color: #c62828; font-weight: 600; }

  @media (max-width: 768px) {
    h1 { font-size: 24px; }
    h2 { font-size: 18px; }
  }
</style>
</head>
<body>

<h1>Admin Dashboard</h1>

<h2>Document Requests</h2>
<div id="requests-grid" class="grid"></div>

<h2>Complaints</h2>
<div id="complaints-grid" class="grid"></div>

<script>
const currentUser = JSON.parse(localStorage.getItem("currentUser")) || null;
if (!currentUser) window.location = "index.html";

async function parseJsonResponse(res) {
  const text = await res.text();

  try {
    return text ? JSON.parse(text) : {};
  } catch (err) {
    return { message: "Unexpected server response" };
  }
}

async function apiFetch(url, options = {}) {
  const res = await fetch(url, options);
  const data = await parseJsonResponse(res);

  if (!res.ok) {
    if (res.status === 401 || res.status === 403) {
      localStorage.removeItem("currentUser");
      alert(data.message || "Admin login required");
      window.location = "index.html";
    }

    throw new Error(data.message || "Request failed");
  }

  return data;
}

async function ensureAdmin() {
  try {
    await apiFetch("/api/admin/me");
    return true;
  } catch (err) {
    console.error(err);
    return false;
  }
}

// Fetch and display document requests
async function loadRequests() {
  const requests = await apiFetch('/api/admin/requests');
  const container = document.getElementById('requests-grid');
  container.innerHTML = '';
  requests.forEach(r => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-header">Request #${r.id}</div>
      <div class="card-row"><span>User ID:</span> ${r.userId}</div>
      <div class="card-row"><span>Document:</span> ${r.doc}</div>
      <div class="card-row"><span>Date:</span> ${r.date}</div>
      <div class="card-row"><span>Time:</span> ${r.time}</div>
      <div class="card-row"><span>Status:</span> <span class="status-${r.status}">${r.status}</span></div>
      <div class="card-row">
        <button class="approve" onclick="updateRequest(${r.id}, 'Approved')">Approve</button>
        <button class="reject" onclick="updateRequest(${r.id}, 'Rejected')">Reject</button>
      </div>
    `;
    container.appendChild(card);
  });
}

// Update request status
async function updateRequest(id, status) {
  await apiFetch('/api/admin/update-request', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ id, status })
  });
  loadRequests(); // refresh
}

// Fetch and display complaints
async function loadComplaints() {
  const complaints = await apiFetch('/api/admin/complaints');
  const container = document.getElementById('complaints-grid');
  container.innerHTML = '';
  complaints.forEach(c => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-header">Complaint #${c.id}</div>
      <div class="card-row"><span>User ID:</span> ${c.userId}</div>
      <div class="card-row"><span>Category:</span> ${c.cat}</div>
      <div class="card-row"><span>Subject:</span> ${c.subj}</div>
      <div class="card-row"><span>Description:</span> ${c.desc}</div>
      <div class="card-row"><span>Status:</span> <span class="status-${c.status}">${c.status}</span></div>
      <div class="card-row">
        <button class="approve" onclick="updateComplaint(${c.id}, 'Approved')">Approve</button>
        <button class="reject" onclick="updateComplaint(${c.id}, 'Rejected')">Reject</button>
      </div>
    `;
    container.appendChild(card);
  });
}

// Update complaint status
async function updateComplaint(id, status) {
  await apiFetch('/api/admin/update-complaint', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ id, status })
  });
  loadComplaints(); // refresh
}

// Initial load
ensureAdmin().then((isAdmin) => {
  if (!isAdmin) return;
  loadRequests();
  loadComplaints();
});
</script>

</body>
</html>
